<!DOCTYPE html>
<html lang="en">

<head>
	<title>Roblox Verification</title>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #0e0e10;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			color: #efeff1;
		}

		.card {
			background: #18181b;
			border: 1px solid #2a2a2e;
			border-radius: 16px;
			padding: 48px 40px;
			max-width: 420px;
			width: 90%;
			text-align: center;
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
		}

		.icon {
			font-size: 48px;
			margin-bottom: 16px;
		}

		h1 {
			font-size: 22px;
			font-weight: 600;
			margin-bottom: 12px;
		}

		p {
			font-size: 15px;
			color: #adadb8;
			line-height: 1.5;
		}

		.spinner {
			width: 40px;
			height: 40px;
			border: 3px solid #2a2a2e;
			border-top-color: #9147ff;
			border-radius: 50%;
			animation: spin 0.8s linear infinite;
			margin: 0 auto 20px;
		}

		@keyframes spin {
			to {
				transform: rotate(360deg);
			}
		}

		.success {
			color: #00c853;
		}

		.error {
			color: #ff5252;
		}

		.username {
			display: inline-block;
			margin-top: 10px;
			padding: 4px 12px;
			background: #2a2a2e;
			border-radius: 20px;
			font-size: 14px;
			color: #9147ff;
			font-weight: 500;
		}
	</style>
</head>

<body>
	<div class="card">
		<div class="spinner" id="spinner"></div>
		<h1 id="title">Verifying your account…</h1>
		<p id="subtitle">Please wait, do not close this tab.</p>
	</div>

	<script>
		const params = window.location.search;
		history.replaceState(null, '', window.location.pathname);

		const spinner = document.getElementById('spinner');
		const title = document.getElementById('title');
		const sub = document.getElementById('subtitle');

		fetch(`https://mimibinding.militaryboi.workers.dev/handle-callback${params}`)
			.then(res => res.json())
			.then(data => {
				spinner.style.display = 'none';
				if (data.ok) {
					title.innerHTML = '<span class="success">✓</span> You\'re verified!';
					sub.innerHTML = `Linked to Roblox account<br><span class="username">${data.robloxUsername}</span><br><br>You can close this tab.`;
				} else {
					title.innerHTML = '<span class="error">✗</span> Something went wrong';
					sub.textContent = data.error || 'Please run /linktoroblox and try again.';
				}
			})
			.catch(() => {
				spinner.style.display = 'none';
				title.innerHTML = '<span class="error">✗</span> Something went wrong';
				sub.textContent = 'Could not reach the verification server. Please try again.';
			});
	</script>
</body>

</html>
