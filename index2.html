<!DOCTYPE html>
<html lang="en">

<head>

	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background: #0e0e10;
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
			color: #efeff1;
			padding: 24px;
		}

		.card {
			background: #18181b;
			border: 1px solid #2a2a2e;
			border-radius: 16px;
			padding: 48px 40px;
			max-width: 480px;
			width: 100%;

		.icon {
			font-size: 48px;
			margin-bottom: 20px;

		h1 {
			font-size: 22px;
			font-weight: 700;
			margin-bottom: 12px;
		}

		p {
			font-size: 15px;
			color: #adadb8;
			line-height: 1.6;
		}

		.links {
			display: flex;
			justify-content: center;
			gap: 16px;
			margin-top: 32px;
		}

		a {
			font-size: 14px;
			color: #adadb8;
			text-decoration: none;
			padding: 8px 16px;
			border: 1px solid #2a2a2e;
			border-radius: 8px;
			transition: color 0.15s, border-color 0.15s;
		}

		a:hover {
			color: #efeff1;
			border-color: #9147ff;
		}

		footer {
			margin-top: 32px;
			font-size: 13px;
			color: #3a3a3e;

<body>
	<div class="card">
